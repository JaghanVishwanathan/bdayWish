<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Clue 5 — Treasure Hunt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hearts-bg" aria-hidden="true"></div>
  <canvas id="confetti-canvas"></canvas>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Adventure Progress</span>
      <span class="progress-percent">100%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <main class="page has-progress">
    <div class="card">
      <p id="story-text" class="story-text"></p>

      <div id="clue-form" class="clue-form">
        <p class="riddle-label">Riddle</p>
        <p class="riddle-text">
          I enjoy peaceful slow mornings,<br />
          fluffy blankets,<br />
          and lazy afternoons.<br /><br />
          The place I am is where we always are together. I am your favourite.
        </p>
        <div class="input-group">
          <input
            id="answer-input"
            class="answer-input"
            type="text"
            placeholder="Your answer..."
            autocomplete="off"
            autocapitalize="off"
          />
        </div>
        <p id="hint-error" class="hint-error"></p>
        <button id="submit-btn" class="btn btn-primary">Check Answer</button>
      </div>

      <div id="reveal-section" class="reveal-section">
        <p class="success-badge">✅ Correct!</p>

        <div id="special-name" class="lego-reveal" style="display: none;">
          <span class="lego-emoji">💝</span>
          <span class="lego-name">Varsha Benny</span>
        </div>

        <p id="joke-text" class="joke-text" style="display: none;">just kidding 😄</p>

        <div id="real-reveal" class="lego-reveal" style="display: none;">
          <span class="lego-emoji">🐼</span>
        </div>

        <button id="finish-btn" class="btn btn-primary" style="display: none; margin-top: 1rem;">Finish Adventure</button>
      </div>
    </div>
  </main>

  <script>
    window.CLUE_CONFIG = {
      clueNumber: 5,
      progress: 100,
      story: "One other friend remains.",
      answers: ["bed", "bedroom", "varsha"],
      nextPage: "finish.html",
      specialReveal: true,
    };
  </script>
  <script src="script.js"></script>
</body>
</html>
